version: "3.9"

services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data

  ui:
    build:
      context: .
      target: ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
